kind = "web"
previewPath = "/"
title = "Streamify"
version = "1.0.0"
id = "artifacts/streamify"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22822

[services.development]
run = "pnpm --filter @workspace/streamify run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/streamify", "run", "build" ]
publicDir = "artifacts/streamify/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22822"
BASE_PATH = "/"
